services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ci_agent
      POSTGRES_USER: ci_agent
      POSTGRES_PASSWORD: ci_agent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
